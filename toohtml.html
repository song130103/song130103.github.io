            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.1);

            cursor: pointer;
        }

<body>
    <button class="music-float-btn" id="floatBtn" onclick="togglePanel()">🎵</button>
    
    <div class="music-panel" id="musicPanel">
        <div class="panel-header">
            <span class="panel-title">🎧 背景音乐</span>
            <button class="close-btn" onclick="togglePanel()">×</button>
        </div>
        
        <div class="album-art" id="albumArt">🎵</div>
        
        <div class="song-info">
            <div class="song-title" id="songTitle">选择一首音乐</div>
            <div class="song-artist" id="songArtist">点击播放</div>
        </div>
        
        <div class="progress-container">
            <div class="progress-bar" id="progressBar" onclick="seek(event)">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="time-info">
                <span id="currentTime">0:00</span>
                <span id="totalTime">0:00</span>
            </div>
        </div>
        
        <div class="controls">
            <button class="ctrl-btn" onclick="prevSong()">⏮</button>
            <button class="ctrl-btn play" id="playBtn" onclick="togglePlay()">▶</button>
            <button class="ctrl-btn" onclick="nextSong()">⏭</button>
        </div>
        
        <div class="volume-control">
            <span class="vol-icon" id="volIcon" onclick="toggleMute()">🔊</span>
            <input type="range" class="vol-slider" id="volSlider" min="0" max="100" value="50" onchange="setVolume(this.value)">
        </div>
        
        <div class="playlist">
            <div class="playlist-title">📋 播放列表</div>
            <div id="playlistContainer"></div>
        </div>
        
        <div class="autoplay-notice">💡 部分浏览器需要交互后才能播放</div>
    </div>
    
    <audio id="audioPlayer" loop></audio>
    
    <script>
        const playlist = [
            { title: 'Happy Rock', artist: 'Kevin MacLeod', url: 'https://cdn.pixabay.com/audio/2022/05/27/audio_1808fbf07a.mp3', cover: '🎸' },
            { title: 'Corporate Motivation', artist: 'Music Unlimited', url: 'https://cdn.pixabay.com/audio/2022/10/25/audio_f3d7330a99.mp3', cover: '💼' },
            { title: 'Ambient Piano', artist: 'Alex Make', url: 'https://cdn.pixabay.com/audio/2022/03/15/audio_c16a8c31c0.mp3', cover: '🎹' },
            { title: 'Calm Sea', artist: 'Piano Amor', url: 'https://cdn.pixabay.com/audio/2021/08/09/audio_dc39bede3e.mp3', cover: '🌊' },
            { title: 'Ukulele Beach', artist: 'Paradise', url: 'https://cdn.pixabay.com/audio/2022/06/07/audio_62d3c0ed82.mp3', cover: '🏖️' },
            { title: 'Summer Jazz', artist: 'Jazz Club', url: 'https://cdn.pixabay.com/audio/2022/08/02/audio_884fe92c21.mp3', cover: '☀️' },
            { title: 'Dreamer', artist: 'Schwarz', url: 'https://cdn.pixabay.com/audio/2022/01/18/audio_2417da146b.mp3', cover: '💭' },
            { title: 'Peaceful', artist: 'LiQWYD', url: 'https://cdn.pixabay.com/audio/2021/11/30/audio_debee6d829.mp3', cover: '🌿' }
        ];
        
        let currentSong = 0, isPlaying = false, isMuted = false, previousVolume = 50, isPanelOpen = false;
        
        const audio = document.getElementById('audioPlayer');
        const floatBtn = document.getElementById('floatBtn');
        const musicPanel = document.getElementById('musicPanel');
        const playBtn = document.getElementById('playBtn');
        const albumArt = document.getElementById('albumArt');
        const songTitle = document.getElementById('songTitle');
        const songArtist = document.getElementById('songArtist');
        const progressFill = document.getElementById('progressFill');
        const currentTimeEl = document.getElementById('currentTime');
        const totalTimeEl = document.getElementById('totalTime');
        const volIcon = document.getElementById('volIcon');
        const volSlider = document.getElementById('volSlider');
        const playlistContainer = document.getElementById('playlistContainer');
        
        function init() {
            renderPlaylist();
            loadSong(currentSong);
            setVolume(volSlider.value);
        }
        
        function renderPlaylist() {
            playlistContainer.innerHTML = playlist.map((song, i) => `
                <div class="playlist-item ${i === currentSong ? 'active' : ''}" onclick="playSong(${i})">
                    <span class="item-num">${i + 1}</span>
                    <div class="item-info">
                        <div class="item-title">${song.title}</div>
                        <div class="item-artist">${song.artist}</div>
                    </div>
                    ${i === currentSong && isPlaying ? '<span class="item-icon">▶️</span>' : ''}
                </div>
            `).join('');
        }
        
        function loadSong(index) {
            currentSong = index;
            const song = playlist[index];
            audio.src = song.url;
            albumArt.textContent = song.cover;
            songTitle.textContent = song.title;
            songArtist.textContent = song.artist;
            renderPlaylist();
        }
        
        function playSong(index) {
            loadSong(index);
            audio.play().then(() => {
                isPlaying = true;
                updateUI();
            }).catch(err => { console.log('播放失败:', err); });
        }
        
        function togglePlay() {
            if (isPlaying) {
                audio.pause();
                isPlaying = false;
            } else {
                audio.play().then(() => { isPlaying = true; }).catch(err => { console.log('播放失败:', err); });
            }
            updateUI();
        }
        
        function prevSong() {
            let newIndex = currentSong - 1;
            if (newIndex < 0) newIndex = playlist.length - 1;
            playSong(newIndex);
        }
        
        function nextSong() {
            let newIndex = currentSong + 1;
            if (newIndex >= playlist.length) newIndex = 0;
            playSong(newIndex);
        }
        
        function updateUI() {
            playBtn.textContent = isPlaying ? '⏸' : '▶';
            floatBtn.textContent = isPlaying ? '🎵' : '🎶';
            floatBtn.classList.toggle('playing', isPlaying);
            albumArt.classList.toggle('playing', isPlaying);
            document.querySelectorAll('.playlist-item').forEach((item, i) => {
                const icon = item.querySelector('.item-icon');
                if (i === currentSong) {
                    if (!icon && isPlaying) item.insertAdjacentHTML('beforeend', '<span class="item-icon">▶️</span>');
                    else if (icon) icon.textContent = '▶️';
                } else if (icon) icon.remove();
            });
        }
        
        function setVolume(val) {
            audio.volume = val / 100;
            volSlider.value = val;
            previousVolume = val;
            isMuted = val === 0;
            updateVolumeIcon();
        }
        
        function toggleMute() {
            if (isMuted) setVolume(previousVolume);
            else { previousVolume = volSlider.value; setVolume(0); }
        }
        
        function updateVolumeIcon() {
            const vol = volSlider.value;
            volIcon.textContent = vol == 0 ? '🔇' : vol < 30 ? '🔈' : vol < 70 ? '🔉' : '🔊';
        }
        
        audio.addEventListener('timeupdate', () => {
            const percent = (audio.currentTime / audio.duration) * 100;
            progressFill.style.width = percent + '%';
            currentTimeEl.textContent = formatTime(audio.currentTime);
        });
        
        audio.addEventListener('loadedmetadata', () => { totalTimeEl.textContent = formatTime(audio.duration); });
        
        function formatTime(seconds) {
            if (isNaN(seconds)) return '0:00';
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }
        
        function seek(event) {
            const bar = document.getElementById('progressBar');
            const rect = bar.getBoundingClientRect();
            const percent = (event.clientX - rect.left) / rect.width;
            audio.currentTime = percent * audio.duration;
        }
        
        audio.addEventListener('ended', () => { nextSong(); });
        
        function togglePanel() {
            isPanelOpen = !isPanelOpen;
            musicPanel.classList.toggle('show', isPanelOpen);
        }
        
        init();
    </script>
