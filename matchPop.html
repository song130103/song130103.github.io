        const icons = ['🐑','🌿','🌸','🌻','🍎','🍊','🍇','🌈','⭐','🔥','💎','🎈','🎁','🎵','🌙','☀️','🌊','❄️','🌈','🍀','🎃','🦊','🐰','🦋'];
        
        // 成就列表
        const achievements = [
            {id:'first',name:'初出茅庐',desc:'完成第一关',icon:'🌱'},
            {id:'clear10',name:'小试牛刀',desc:'消除10个方块',icon:'🎯'},
            {id:'clear100',name:'消除达人',desc:'消除100个方块',icon:'🏆'},
            {id:'win5',name:'常胜将军',desc:'通关5次',icon:'👑'},
            {id:'reach5',name:'稳步前行',desc:'达到第5关',icon:'🪜'},
            {id:'reach10',name:'十关斩将',desc:'达到第10关',icon:'⚔️'},
            {id:'maxLv',name:'极限挑战',desc:'达到第20关',icon:'🚀'},
            {id:'noHint',name:'独立自主',desc:'不使用提示通关',icon:'💪'},
            {id:'noTool',name:'徒手攀登',desc:'不使用任何道具通关',icon:'🧗'},
            {id:'combo3',name:'三连消',desc:'一次性消除3组',icon:'💫'},
            {id:'speedWin',name:'速战速决',desc:'30秒内通关',icon:'⚡'},
            {id:'persistence',name:'坚持不懈',desc:'累计游戏50次',icon:'💎'},
            {id:'perfect',name:'完美通关',desc:'剩余超过15个方块通关',icon:'✨'},
            {id:'unlucky',name:'否极泰来',desc:'连续失败10次后获胜',icon:'🍀'},
            {id:'veteran',name:'羊圈老手',desc:'累计通关50次',icon:'🎖️'}
        ];
        
        // DOM元素
        const blockLayer = document.getElementById('blockLayer');
        const gameArea = document.getElementById('gameArea');
        const slotsContainer = document.querySelector('.slots');
        const gameOverModal = document.getElementById('gameOverModal');
        const winOverlay = document.getElementById('winOverlay');
        
        // 初始化
        function init() {
            document.getElementById('level').textContent = currentLevel;
            document.getElementById('hintCount').textContent = hints;
            document.getElementById('shuffleCount').textContent = shuffles;
            document.getElementById('undoCount').textContent = undos;
            updateStats();
            renderAchievements();
            
            document.getElementById('achBtn').dataset.count = `${unlockedAch.length}/${achievements.length}`;
            
            gamesPlayed++;
            localStorage.setItem('yang_played', gamesPlayed);
            
            createLevel();
        }
        
        // 创建关卡
        function createLevel() {
            blockLayer.innerHTML = '';
            blocks = [];
            slots = [null,null,null,null,null,null,null];
            selectedSlot = null;
            history = [];
            
            updateSlotsDisplay();
            
            const blockCount = 15 + currentLevel * 3;
            const iconCount = Math.min(8 + Math.floor(currentLevel / 3), 18);
            const selectedIcons = shuffleArray([...icons]).slice(0, iconCount);
            
            // 生成方块
            let positions = generatePositions(blockCount);
            
            for (let i = 0; i < positions.length; i++) {
                const pos = positions[i];
                const icon = selectedIcons[i % selectedIcons.length];
                
                const block = document.createElement('div');
                block.className = 'block';
                block.textContent = icon;
                block.dataset.index = i;
                block.dataset.icon = icon;
                block.style.left = pos.x + 'px';
                block.style.top = pos.y + 'px';
                block.style.zIndex = pos.z;
                
                block.addEventListener('click', () => selectBlock(i));
                
                blockLayer.appendChild(block);
                blocks.push({element: block, icon: icon, removed: false, x: pos.x, y: pos.y, z: pos.z});
            }
        }
        
        // 生成位置
        function generatePositions(count) {
            const positions = [];
            const areaWidth = Math.min(350, window.innerWidth - 40);
            const areaHeight = Math.min(400, window.innerHeight - 300);
            const cols = Math.floor(areaWidth / 50);
            const rows = Math.ceil(count / cols);
            
            gameArea.style.width = areaWidth + 'px';
            gameArea.style.height = areaHeight + 'px';
            
            for (let i = 0; i < count; i++) {
                const col = i % cols;
                const row = Math.floor(i / cols);
                const z = row;
                
                positions.push({
                    x: col * 48 + Math.random() * 5,
                    y: row * 48 + Math.random() * 5,
                    z: z
                });
            }
            
            return positions;
        }
        
        // 选择方块
        function selectBlock(index) {
            const block = blocks[index];
            if (block.removed) return;
            
            // 找空槽位
            const emptySlot = slots.findIndex(s => s === null);
            if (emptySlot === -1) {
                gameOver();
                return;
            }
            
            history.push({slots: [...slots]});
            
            // 放置到槽位
            slots[emptySlot] = block.icon;
            block.removed = true;
            block.element.classList.add('hidden');
            
            updateSlotsDisplay();
            updateStats();
            checkSlotMatch();
            checkWin();
        }
        
        // 更新槽位显示
        function updateSlotsDisplay() {
            for (let i = 0; i < 7; i++) {
                const slotEl = document.getElementById('slot' + i);
                slotEl.textContent = slots[i] || '';
                slotEl.className = 'slot' + (slots[i] ? ' filled' : '');
            }
        }
        
        // 检查槽位匹配
        function checkSlotMatch() {
            let matchCount = 0;
            
            for (let i = 0; i < 7; i++) {
                if (slots[i] && slots[i] === slots[0]) {
                    matchCount++;
                }
            }
            
            if (matchCount === 3) {
                const icon = slots[0];
                for (let i = 0; i < 7; i++) {
                    if (slots[i] === icon) {
                        slots[i] = null;
                        totalRemoved++;
                    }
                }
                
                setTimeout(() => {
                    updateSlotsDisplay();
                    updateStats();
                    
                    if (matchCount >= 3) {
                        unlockAchievement('combo3');
                    }
                }, 100);
            }
        }
        
        // 更新统计
        function updateStats() {
            const remain = blocks.filter(b => !b.removed).length;
            document.getElementById('remain').textContent = remain;
            document.getElementById('removed').textContent = totalRemoved;
        }
        
        // 检查胜利
        function checkWin() {
            const remain = blocks.filter(b => !b.removed).length;
            
            if (remain === 0) {
                gamesWon++;
                maxLevel = Math.max(maxLevel, currentLevel + 1);
                
                localStorage.setItem('yang_won', gamesWon);
                localStorage.setItem('yang_maxLevel', maxLevel);
                localStorage.setItem('yang_level', currentLevel + 1);
                localStorage.setItem('yang_removed', totalRemoved);
                
                unlockAchievement('first');
                unlockAchievement('win5');
                unlockAchievement('reach' + Math.min(currentLevel, 10));
                if (currentLevel >= 20) unlockAchievement('maxLv');
                if (totalRemoved >= 10) unlockAchievement('clear10');
                if (totalRemoved >= 100) unlockAchievement('clear100');
                if (remain > 15) unlockAchievement('perfect');
                
                setTimeout(() => {
                    winOverlay.classList.add('show');
                }, 300);
            }
        }
        
        // 游戏结束
        function gameOver() {
            unlockAchievement('persistence');
            gameOverModal.classList.add('show');
        }
        
        // 重新开始
        function restartGame() {
            gameOverModal.classList.remove('show');
            hints = 3; shuffles = 2; undos = 3;
            createLevel();
            init();
        }
        
        // 下一关
        function nextLevel() {
            winOverlay.classList.remove('show');
            currentLevel++;
            hints = 3; shuffles = 2; undos = 3;
            init();
        }
        
        // 提示
        function useHint() {
            if (hints <= 0) return;
            
            const available = blocks.filter(b => !b.removed);
            if (available.length === 0) return;
            
            hints--;
            document.getElementById('hintCount').textContent = hints;
            
            // 找一对
            const iconCount = {};
            for (const block of available) {
                iconCount[block.icon] = (iconCount[block.icon] || 0) + 1;
            }
            
            const target = Object.entries(iconCount).find(([k,v]) => v >= 2);
            if (target) {
                const [icon] = target;
                const targets = available.filter(b => b.icon === icon).slice(0, 2);
                targets.forEach(b => b.element.classList.add('selected'));
                setTimeout(() => targets.forEach(b => b.element.classList.remove('selected')), 1000);
            }
        }
        
        // 洗牌
        function useShuffle() {
            if (shuffles <= 0) return;
            shuffles--;
            document.getElementById('shuffleCount').textContent = shuffles;
            
            const available = blocks.filter(b => !b.removed);
            const positions = available.map(b => ({x: b.x, y: b.y, z: b.z}));
            const shuffled = shuffleArray(positions);
            // 洗牌（续）
            available.forEach((b, i) => {
                b.x = shuffled[i].x;
                b.y = shuffled[i].y;
                b.element.style.left = b.x + 'px';
                b.element.style.top = b.y + 'px';
            });
        }

        // 撤销
        function useUndo() {
            if (undos <= 0 || history.length === 0) return;
            undos--;
            document.getElementById('undoCount').textContent = undos;
            
            const lastState = history.pop();
            slots = lastState.slots;
            updateSlotsDisplay();
            
            // 恢复最后一个方块
            const removed = blocks.filter(b => b.removed);
            if (removed.length > 0) {
                const last = removed[removed.length - 1];
                last.removed = false;
                last.element.classList.remove('hidden');
            }
        }

        // 洗牌函数
        function shuffleArray(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        // 解锁成就
        function unlockAchievement(id) {
            if (unlockedAch.includes(id)) return;
            unlockedAch.push(id);
            localStorage.setItem('yang_ach', JSON.stringify(unlockedAch));
            renderAchievements();
            document.getElementById('achBtn').dataset.count = `${unlockedAch.length}/${achievements.length}`;
        }

        // 渲染成就
        function renderAchievements() {
            const list = document.getElementById('achList');
            list.innerHTML = achievements.map(a => `
                <div class="ach-item ${unlockedAch.includes(a.id) ? 'unlocked' : ''}">
                    <div class="ach-item-icon">${a.icon}</div>
                    <div class="ach-item-name">${a.name}</div>
                    <div class="ach-item-desc">${a.desc}</div>
                </div>
            `).join('');
        }

        // 事件绑定
        document.getElementById('hintBtn').addEventListener('click', useHint);
        document.getElementById('shuffleBtn').addEventListener('click', useShuffle);
        document.getElementById('undoBtn').addEventListener('click', useUndo);
        document.getElementById('restartBtn').addEventListener('click', restartGame);
        document.getElementById('achBtn').addEventListener('click', () => document.getElementById('achPanel').classList.add('open'));
        document.getElementById('closeAch').addEventListener('click', () => document.getElementById('achPanel').classList.remove('open'));

        // 启动
        init();
