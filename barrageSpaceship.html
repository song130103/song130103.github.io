<!DOCTYPE html>
<html lang="zh">
<head><script charset="UTF-8" id="LA_COLLECT" src="//sdk.51.la/js-sdk-pro.min.js"></script>
<script>LA.init({id:"3PWw56riQLlb0j24",ck:"3PWw56riQLlb0j24",autoTrack:true,hashMode:true,screenRecord:true})</script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>弹幕飞船</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        canvas { display: block; }
        #ui {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 10;
        }
        #score {
            position: absolute;
            top: 20px; left: 20px;
            color: #fff;
            font-size: 24px;
            text-shadow: 0 0 10px #0ff;
        }
        #highScore {
            position: absolute;
            top: 55px; left: 20px;
            color: #ffd700;
            font-size: 14px;
        }
        #startScreen, #gameOverScreen {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: #fff;
            pointer-events: auto;
        }
        #startScreen h1 {
            font-size: 48px;
            margin-bottom: 10px;
            text-shadow: 0 0 20px #0ff, 0 0 40px #f0f;
        }
        #startScreen p {
            color: rgba(255,255,255,0.7);
            margin-bottom: 30px;
            font-size: 16px;
        }
        .btn {
            padding: 15px 50px;
            font-size: 20px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 30px;
            color: #fff;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 30px rgba(102, 126, 234, 0.6);
        }
        #gameOverScreen h2 {
            font-size: 36px;
            color: #f55;
            margin-bottom: 20px;
            text-shadow: 0 0 20px #f00;
        }
        #finalScore {
            font-size: 24px;
            margin-bottom: 30px;
            color: #ffd700;
        }
        .hidden { display: none !important; }
        #controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.5);
            font-size: 12px;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="ui">
        <div id="score">分数: 0</div>
        <div id="highScore">最高: 0</div>
        
        <div id="startScreen">
            <h1>🚀 弹幕飞船</h1>
            <p>躲避弹幕，存活越久分数越高</p>
            <button class="btn" id="startBtn">开始游戏</button>
            <div id="controls">
                PC: 鼠标/方向键移动 · 手机: 触摸移动
            </div>
        </div>
        
        <div id="gameOverScreen" class="hidden">
            <h2>💥 游戏结束</h2>
            <div id="finalScore">得分: 0</div>
            <button class="btn" id="restartBtn">再来一次</button>
        </div>
    </div>

    <script>alert('为了积极响应国家政策，守护青少年网络健康，本游戏添加了防沉迷机制。当游玩时间超过5分钟时会弹窗提醒并自动退出游戏。');
setTimeout(() => { 
	
	alert('不许沉迷游戏，勤学善思才能赢'); 
        location.href=''; 
}, 300000);
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        let width, height;
        let gameState = 'start'; // start, playing, over
        let score = 0;
        let highScore = localStorage.getItem('bulletHighScore') || 0;
        let difficulty = 1;
        let lastTime = 0;
        
        // 玩家
        const player = {
            x: 0, y: 0,
            size: 20,
            speed: 8,
            invincible: 0
        };
        
        // 弹幕
        let bullets = [];
        let particles = [];
        let powerups = [];
        
        // 控制
        let mouseX = 0, mouseY = 0;
        let keys = {};
        let touchX = null, touchY = null;
        
        // 弹幕样式
        const bulletColors = ['#ff4444', '#ff8844', '#ffcc44', '#44ff44', '#44ccff', '#ff44ff'];
        
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            player.x = width / 2;
            player.y = height * 0.75;
        }
        
        function init() {
            score = 0;
            difficulty = 1;
            bullets = [];
            particles = [];
            powerups = [];
            player.x = width / 2;
            player.y = height * 0.75;
            player.invincible = 60;
            document.getElementById('highScore').textContent = '最高: ' + highScore;
        }
        
        function startGame() {
            gameState = 'playing';
            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('gameOverScreen').classList.add('hidden');
            init();
            requestAnimationFrame(gameLoop);
        }
        
        function gameOver() {
            gameState = 'over';
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('bulletHighScore', highScore);
            }
            document.getElementById('finalScore').textContent = '得分: ' + score;
            document.getElementById('gameOverScreen').classList.remove('hidden');
        }
        
        // 生成弹幕
        function spawnBullets() {
            const spawnRate = Math.min(30 - difficulty * 2, 15);
            if (Math.random() < 1 / spawnRate) {
                const type = Math.random();
                if (type < 0.4) {
                    // 单发
                    spawnSingleBullet();
                } else if (type < 0.7) {
                    // 散弹
                    spawnSpread();
                } else if (type < 0.9) {
                    // 圆形
                    spawnCircle();
                } else {
                    // 瞄准
                    spawnAimed();
                }
            }
            
            // 偶尔生成道具
            if (Math.random() < 0.005 && powerups.length < 2) {
                powerups.push({
                    x: Math.random() * (width - 60) + 30,
                    y: -30,
                    size: 20,
                    type: 'shield',
                    vy: 2
                });
            }
        }
        
        function spawnSingleBullet() {
            bullets.push({
                x: Math.random() * (width - 60) + 30,
                y: -20,
                vx: 0,
                vy: 4 + difficulty * 0.5,
                size: 8,
                color: bulletColors[Math.floor(Math.random() * bulletColors.length)]
            });
        }
        
        function spawnSpread() {
            const cx = Math.random() * (width - 100) + 50;
            const count = 3 + Math.floor(difficulty / 2);
            for (let i = 0; i < count; i++) {
                const angle = -Math.PI / 2 + (i - count / 2) * 0.3;
                bullets.push({
                    x: cx,
                    y: -20,
                    vx: Math.cos(angle) * 4,
                    vy: Math.sin(angle) * 4,
                    size: 6,
                    color: bulletColors[Math.floor(Math.random() * bulletColors.length)]
                });
            }
        }
        
        function spawnCircle() {
            const cx = Math.random() * (width - 100) + 50;
            const count = 8 + Math.floor(difficulty / 2);
            for (let i = 0; i < count; i++) {
                const angle = (i / count) * Math.PI * 2;
                bullets.push({
                    x: cx,
                    y: -20,
                    vx: Math.cos(angle) * 3,
                    vy: Math.sin(angle) * 3 + 2,
                    size: 6,
                    color: '#ff44ff'
                });
            }
        }
        
        function spawnAimed() {
            const angle = Math.atan2(player.y, player.x - width / 2);
            bullets.push({
                x: Math.random() * (width - 60) + 30,
                y: -20,
                vx: Math.cos(angle) * 1.5,
                vy: 5,
                size: 10,
                color: '#ff0000',
                homing: true
            });
        }
        
        function update() {
            if (gameState !== 'playing') return;
            
            // 分数增加
            score++;
            if (score % 500 === 0) difficulty++;
            document.getElementById('score').textContent = '分数: ' + score;
            
            // 无敌时间
            if (player.invincible > 0) player.invincible--;
            
            // 玩家移动
            let dx = 0, dy = 0;
            
            // 触摸控制
            if (touchX !== null) {
                dx = touchX - player.x;
                dy = touchY - player.y;
            }
            // 键盘控制
            if (keys['ArrowLeft'] || keys['KeyA']) dx -= player.speed;
            if (keys['ArrowRight'] || keys['KeyD']) dx += player.speed;
            if (keys['ArrowUp'] || keys['KeyW']) dy -= player.speed;
            if (keys['ArrowDown'] || keys['KeyS']) dy += player.speed;
            
            // 鼠标控制
            if (!touchX && (keys['mouse'])) {
                dx = mouseX - player.x;
                dy = mouseY - player.y;
            }
            
            // 平滑移动
            player.x += dx * 0.15;
            player.y += dy * 0.15;
            
            // 边界限制
            player.x = Math.max(player.size, Math.min(width - player.size, player.x));
            player.y = Math.max(player.size, Math.min(height - player.size, player.y));
            
            // 生成弹幕
            spawnBullets();
            
            // 更新弹幕
            for (let i = bullets.length - 1; i >= 0; i--) {
                const b = bullets[i];
                if (b.homing) {
                    const angle = Math.atan2(player.y - b.y, player.x - b.x);
                    b.vx += Math.cos(angle) * 0.1;
                    b.vy += Math.sin(angle) * 0.1;
                    const speed = Math.sqrt(b.vx * b.vx + b.vy * b.vy);
                    if (speed > 6) {
                        b.vx = (b.vx / speed) * 6;
                        b.vy = (b.vy / speed) * 6;
                    }
                }
                b.x += b.vx;
                b.y += b.vy;
                
                // 移除出界弹幕
                if (b.y > height + 50 || b.y < -50 || b.x < -50 || b.x > width + 50) {
                    bullets.splice(i, 1);
                    continue;
                }
                
                // 碰撞检测
                if (player.invincible <= 0) {
                    const dist = Math.sqrt((b.x - player.x) ** 2 + (b.y - player.y) ** 2);
                    if (dist < player.size + b.size) {
                        createExplosion(player.x, player.y, '#fff');
                        gameOver();
                        return;
                    }
                }
            }
            
            // 更新道具
            for (let i = powerups.length - 1; i >= 0; i--) {
                const p = powerups[i];
                p.y += p.vy;
                
                if (p.y > height + 30) {
                    powerups.splice(i, 1);
                    continue;
                }
                
                const dist = Math.sqrt((p.x - player.x) ** 2 + (p.y - player.y) ** 2);
                if (dist < player.size + p.size) {
                    player.invincible = Math.max(player.invincible, 120);
                    createExplosion(p.x, p.y, '#0ff');
                    powerups.splice(i, 1);
                }
            }
            
            // 更新粒子
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.life--;
                if (p.life <= 0) particles.splice(i, 1);
            }
        }
        
        function createExplosion(x, y, color) {
            for (let i = 0; i < 20; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 5 + 2;
                particles.push({
                    x, y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    color: color,
                    size: Math.random() * 4 + 2,
                    life: 30
                });
            }
        }
        
        function draw() {
            // 背景
            ctx.fillStyle = '#0a0a15';
            ctx.fillRect(0, 0, width, height);
            
            // 星空背景
            ctx.fillStyle = 'rgba(255,255,255,0.3)';
            for (let i = 0; i < 50; i++) {
                const x = (i * 37 + Date.now() * 0.02) % width;
                const y = (i * 73 + Date.now() * 0.05) % height;
                ctx.beginPath();
                ctx.arc(x, y, 1, 0, Math.PI * 2);
                ctx.fill();
            }
            
            // 弹幕
            for (const b of bullets) {
                ctx.beginPath();
                ctx.arc(b.x, b.y, b.size, 0, Math.PI * 2);
                ctx.fillStyle = b.color;
                ctx.fill();
                
                // 发光效果
                ctx.shadowColor = b.color;
                ctx.shadowBlur = 15;
                ctx.beginPath();
                ctx.arc(b.x, b.y, b.size * 0.6, 0, Math.PI * 2);
                ctx.fillStyle = '#fff';
                ctx.fill();
                ctx.shadowBlur = 0;
            }
            
            // 道具
            for (const p of powerups) {
                ctx.save();
                ctx.translate(p.x, p.y);
                ctx.rotate(Date.now() * 0.005);
                
                ctx.beginPath();
                for (let i = 0; i < 6; i++) {
                    const angle = (i / 6) * Math.PI * 2;
                    const r = i % 2 === 0 ? p.size : p.size * 0.5;
                    if (i === 0) ctx.moveTo(Math.cos(angle) * r, Math.sin(angle) * r);
                    else ctx.lineTo(Math.cos(angle) * r, Math.sin(angle) * r);
                }
                ctx.closePath();
                ctx.fillStyle = '#0ff';
                ctx.fill();
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2;
                ctx.stroke();
                
                ctx.shadowColor = '#0ff';
                ctx.shadowBlur = 20;
                ctx.fill();
                
                ctx.restore();
            }
            
            // 玩家
            if (gameState === 'playing') {
                ctx.save();
                ctx.translate(player.x, player.y);
                
                // 闪烁效果（无敌时）
                if (player.invincible > 0 && Math.floor(player.invincible / 5) % 2 === 0) {
                    ctx.globalAlpha = 0.5;
                }
                
                // 飞船主体
                ctx.fillStyle = '#0ff';
                ctx.beginPath();
                ctx.moveTo(0, -player.size);
                ctx.lineTo(-player.size * 0.8, player.size * 0.8);
                ctx.lineTo(0, player.size * 0.4);
                ctx.lineTo(player.size * 0.8, player.size * 0.8);
                ctx.closePath();
                ctx.fill();
                
                // 驾驶舱
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.arc(0, 0, player.size * 0.3, 0, Math.PI * 2);
                ctx.fill();
                
                // 引擎火焰
                ctx.fillStyle = '#f80';
                ctx.beginPath();
                ctx.moveTo(-player.size * 0.3, player.size * 0.6);
                ctx.lineTo(0, player.size * 1.2 + Math.random() * 10);
                ctx.lineTo(player.size * 0.3, player.size * 0.6);
                ctx.fill();
                
                // 发光
                ctx.shadowColor = '#0ff';
                ctx.shadowBlur = 20;
                ctx.fill();
                
                ctx.restore();
            }
            
            // 粒子
            for (const p of particles) {
                ctx.globalAlpha = p.life / 30;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.globalAlpha = 1;
        }
        
        function gameLoop(time) {
            const delta = time - lastTime;
            lastTime = time;
            
            update();
            draw();
            
            if (gameState === 'playing') {
                requestAnimationFrame(gameLoop);
            }
        }
        
        // 事件监听
        window.addEventListener('resize', resize);
        
        window.addEventListener('keydown', e => {
            keys[e.code] = true;
        });
        
        window.addEventListener('keyup', e => {
            keys[e.code] = false;
        });
        
        window.addEventListener('mousemove', e => {
            mouseX = e.clientX;
            mouseY = e.clientY;
            keys['mouse'] = true;
        });
        
        window.addEventListener('mousedown', () => {
            keys['mouse'] = true;
        });
        
        window.addEventListener('mouseup', () => {
            keys['mouse'] = false;
        });
        
        // 触摸事件
        canvas.addEventListener('touchstart', e => {
            e.preventDefault();
            touchX = e.touches[0].clientX;
            touchY = e.touches[0].clientY;
        });
        
        canvas.addEventListener('touchmove', e => {
            e.preventDefault();
            touchX = e.touches[0].clientX;
            touchY = e.touches[0].clientY;
        });
        
        canvas.addEventListener('touchend', e => {
            e.preventDefault();
            touchX = null;
            touchY = null;
        });
        
        // 按钮
        document.getElementById('startBtn').addEventListener('click', startGame);
        document.getElementById('restartBtn').addEventListener('click', startGame);
        
        // 初始化
        resize();
        document.getElementById('highScore').textContent = '最高: ' + highScore;
    </script>
</body>
</html>
