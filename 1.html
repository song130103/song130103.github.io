<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>song的个人网站</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            background-attachment: fixed;
            color: #fff;
            overflow-x: hidden;
        }

        /* 动态背景粒子 */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 0;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            animation: float 15s infinite;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) rotate(720deg);
                opacity: 0;
            }
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 900px;
            margin: 0 auto;
            padding: 60px 20px;
        }

        /* 头部 */
        header {
            text-align: center;
            margin-bottom: 60px;
            animation: fadeInDown 0.8s ease;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0 auto 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            box-shadow: 0 10px 40px rgba(102, 126, 234, 0.4);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% {
                box-shadow: 0 10px 40px rgba(102, 126, 234, 0.4);
            }
            50% {
                box-shadow: 0 10px 60px rgba(102, 126, 234, 0.6);
            }
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #fff 0%, #a8c0ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.6);
            font-weight: 300;
        }

        /* 卡片容器 */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }

        /* 链接卡片 */
        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 30px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-decoration: none;
            color: inherit;
            animation: fadeInUp 0.8s ease backwards;
        }

        .card:nth-child(1) { animation-delay: 0.1s; }
        .card:nth-child(2) { animation-delay: 0.2s; }
        .card:nth-child(3) { animation-delay: 0.3s; }
        .card:nth-child(4) { animation-delay: 0.4s; }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card:hover {
            transform: translateY(-10px);
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(102, 126, 234, 0.5);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
        }

        .card-icon {
            width: 60px;
            height: 60px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            margin-bottom: 20px;
        }

        .card:nth-child(1) .card-icon { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .card:nth-child(2) .card-icon { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
        .card:nth-child(3) .card-icon { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); }
        .card:nth-child(4) .card-icon { background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%); }

        .card h2 {
            font-size: 1.25rem;
            font-weight: 500;
            margin-bottom: 10px;
        }

        .card p {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.5);
            line-height: 1.6;
        }

        .card-arrow {
            display: inline-block;
            margin-left: 8px;
            transition: transform 0.3s;
        }

        .card:hover .card-arrow {
            transform: translateX(5px);
        }

        /* 游戏区特别卡片 */
        .card.game-card {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.2) 0%, rgba(118, 75, 162, 0.2) 100%);
            border: 2px solid rgba(102, 126, 234, 0.3);
            position: relative;
            overflow: hidden;
        }

        .card.game-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.1), transparent);
            transform: rotate(45deg);
            animation: shine 3s infinite;
        }

        @keyframes shine {
            0% { transform: translateX(-100%) rotate(45deg); }
            100% { transform: translateX(100%) rotate(45deg); }
        }

        .card.game-card:hover {
            border-color: rgba(102, 126, 234, 0.8);
        }

        /* 页脚 */
        footer {
            text-align: center;
            padding: 40px 20px;
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.85rem;
            animation: fadeIn 1s ease 0.5s backwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        footer a {
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            transition: color 0.3s;
        }

        footer a:hover {
            color: #667eea;
        }

        /* 响应式 */
        @media (max-width: 600px) {
            h1 { font-size: 1.8rem; }
            .container { padding: 40px 15px; }
            .card { padding: 25px; }
        }
    </style>
</head>
<body>
    <!-- 背景粒子 -->
    <div class="particles" id="particles"></div>

    <div class="container">
        <header>
            <div class="avatar">🎮</div>
            <h1>song 的个人网站</h1>
            <p class="subtitle">欢迎来到我的小窝 👋</p>
        </header>

        <div class="card-grid">
            <a href="https://song.zreamer.top/toohtml.html" class="card game-card">
                <div class="card-icon">🎯</div>
                <h2>游戏区 <span class="card-arrow">→</span></h2>
                <p>点击进入游戏分区，体验各种有趣的小游戏</p>
            </a>

            <a href="http://www.zreamer.top/" class="card" target="_blank">
                <div class="card-icon">👥</div>
                <h2>朋友的网站 <span class="card-arrow">↗</span></h2>
                <p>去看看朋友的个人网站，说不定有惊喜哦</p>
            </a>

            <a href="https://backrooms-wiki-cn.wikidot.com/" class="card" target="_blank">
                <div class="card-icon">🚪</div>
                <h2>后室 Wiki <span class="card-arrow">↗</span></h2>
                <p>探索后室的无限空间，诡异的随机世界</p>
            </a>

            <a href="https://song.zreamer.top/360.apk" class="card">
                <div class="card-icon">📱</div>
                <h2>360优化大师 <span class="card-arrow">↓</span></h2>
                <p>安卓32位安装包，手机清理优化工具</p>
            </a>
        </div>

        <footer>
            <p>Made with 💜 by song · <a href="https://song.zreamer.top">song.zreamer.top</a></p>
        </footer>
    </div>

    <script>
        // 创建背景粒子
        const particles = document.getElementById('particles');
        for (let i = 0; i < 50; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDuration = (Math.random() * 10 + 10) + 's';
            particle.style.animationDelay = Math.random() * 10 + 's';
            particle.style.width = (Math.random() * 4 + 2) + 'px';
            particle.style.height = particle.style.width;
            particles.appendChild(particle);
        }
    </script>
</body>
</html>
