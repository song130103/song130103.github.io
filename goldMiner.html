<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>黄金矿工 Gold Miner</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: 'Comic Sans MS', cursive, sans-serif;
            background: linear-gradient(180deg, #4a3728 0%, #2d1f15 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            touch-action: manipulation;
        }
        
        #gameContainer {
            position: relative;
            width: 100%;
            max-width: 800px;
            height: 100vh;
            max-height: 600px;
        }
        
        #gameCanvas {
            display: block;
            width: 100%;
            height: 100%;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }
        
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #fff;
            font-size: 14px;
            text-shadow: 2px 2px 2px rgba(0,0,0,0.8);
            pointer-events: none;
            z-index: 10;
        }
        
        .ui-box {
            background: linear-gradient(145deg, #8b6914, #5c4610);
            padding: 8px 15px;
            border-radius: 20px;
            border: 3px solid #d4a843;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3), inset 0 2px 4px rgba(255,255,255,0.2);
        }
        
        .ui-box span {
            color: #ffd700;
            font-weight: bold;
        }
        
        #levelDisplay {
            position: absolute;
            top: 60px;
            left: 50%;
            transform: translateX(-50%);
            color: #ffd700;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 3px 3px 3px rgba(0,0,0,0.8);
            pointer-events: none;
            z-index: 10;
        }
        
        #mobileButton {
            display: none;
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(145deg, #ff6b35, #d44a1a);
            border: 5px solid #ffaa00;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 6px 12px rgba(0,0,0,0.4);
            z-index: 20;
        }
        
        #mobileButton:active {
            transform: translateX(-50%) scale(0.95);
            box-shadow: 0 3px 6px rgba(0,0,0,0.4);
        }
        
        @media (max-width: 768px) {
            #mobileButton {
                display: flex;
                align-items: center;
                justify-content: center;
            }
            .ui-box {
                padding: 5px 10px;
                font-size: 12px;
            }
        }
        
        #startScreen, #gameOverScreen, #levelCompleteScreen {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            color: white;
            text-align: center;
            padding: 20px;
        }
        
        #startScreen h1, #gameOverScreen h1, #levelCompleteScreen h1 {
            font-size: 36px;
            color: #ffd700;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.8);
            margin-bottom: 20px;
        }
        
        #startScreen p, #gameOverScreen p, #levelCompleteScreen p {
            font-size: 16px;
            margin: 10px 0;
            color: #ddd;
        }
        
        .game-btn {
            margin-top: 20px;
            padding: 15px 40px;
            font-size: 20px;
            font-weight: bold;
            color: white;
            background: linear-gradient(145deg, #4CAF50, #388E3C);
            border: none;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 6px 12px rgba(0,0,0,0.4);
            transition: transform 0.1s;
        }
        
        .game-btn:hover {
            transform: scale(1.05);
        }
        
        .game-btn:active {
            transform: scale(0.98);
        }
        
        .hidden {
            display: none !important;
        }
        
        .result-text {
            font-size: 24px;
            color: #ffd700;
            margin: 10px 0;
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        
        .shake {
            animation: shake 0.3s ease-in-out;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        <div id="ui">
            <div class="ui-box">当前: <span id="currentMoney">$0</span></div>
            <div class="ui-box">目标: <span id="targetMoney">$200</span></div>
            <div class="ui-box">时间: <span id="timeLeft">60</span>秒</div>
        </div>
        <div id="levelDisplay">第 1 关</div>
        <button id="mobileButton">抓住!</button>
        
        <div id="startScreen">
            <h1>⛏️ 黄金矿工 ⛏️</h1>
            <p>控制抓斗挖掘宝藏!</p>
            <p>💎 钻石最值钱!</p>
            <p>⏱️ 在规定时间内达到目标金额</p>
            <p style="color: #aaa; margin-top: 20px;">
                空格键/点击: 释放抓斗<br>
                再次按下: 收回抓斗
            </p>
            <button class="game-btn" id="startBtn">开始游戏</button>
        </div>
        
        <div id="gameOverScreen" class="hidden">
            <h1>💔 游戏结束 💔</h1>
            <p class="result-text">得分: <span id="finalScore">0</span></p>
            <p>挑战失败,未达到目标!</p>
            <button class="game-btn" id="restartBtn">再试一次</button>
        </div>
        
        <div id="levelCompleteScreen" class="hidden">
            <h1>🎉 过关啦! 🎉</h1>
            <p class="result-text">本关得分: <span id="levelScore">0</span></p>
            <p>下一关目标: <span id="nextTarget">$400</span></p>
            <button class="game-btn" id="nextLevelBtn">下一关</button>
        </div>
    </div>

    <script>
        // Game Configuration
        const CONFIG = {
            LEVEL_BASE_GOAL: 200,
            LEVEL_GOAL_INCREMENT: 200,
            TIME_LIMIT: 60,
            CLAW_SPEED: 5,
            CLAW_ROTATION_SPEED: 0.03,
            CLAW_RETRACT_SPEED: 4,
            CLAW_MAX_LENGTH: 320,
            MINERAL_COUNT_BASE: 8,
            MINERAL_COUNT_INCREMENT: 2
        };

        // Mineral Types
        const MINERALS = {
            STONE: { name: '石头', value: 10, size: 20, color: '#888', rarity: 0.25 },
            SMALL_GOLD: { name: '小金块', value: 50, size: 25, color: '#FFD700', rarity: 0.25 },
            GOLD: { name: '金块', value: 100, size: 35, color: '#FFA500', rarity: 0.2 },
            BIG_GOLD: { name: '大金块', value: 250, size: 50, color: '#FF8C00', rarity: 0.12 },
            DIAMOND: { name: '钻石', value: 500, size: 22, color: '#00FFFF', rarity: 0.1 },
            BIG_DIAMOND: { name: '大钻石', value: 1000, size: 38, color: '#E0FFFF', rarity: 0.05 }
        };

        // Game State
        let canvas, ctx;
        let gameWidth, gameHeight;
        let gameState = 'start'; // start, playing, gameOver, levelComplete
        let currentLevel = 1;
        let currentMoney = 0;
        let targetMoney = CONFIG.LEVEL_BASE_GOAL;
        let timeLeft = CONFIG.TIME_LIMIT;
        let lastTime = 0;
        
        // Claw State
        let clawAngle = 0;
        let clawLength = 60;
        let clawState = 'rotating'; // rotating, extending, retracting
        let grabbedMineral = null;
        let clawX, clawY;
        
        // Minerals
        let minerals = [];
        
        // Animation effects
        let floatingTexts = [];
        let moneyBags = [];
        
        // Background image
        let bgImage = new Image();
        bgImage.src = 'imgs/260517_11_生图/img.jpg';

        // Initialize Game
        function init() {
            canvas = document.getElementById('gameCanvas');
            ctx = canvas.getContext('2d');
            
            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);
            
            // Input handlers
            document.addEventListener('keydown', handleKeyDown);
            canvas.addEventListener('click', handleClick);
            canvas.addEventListener('touchstart', handleTouch, { passive: false });
            document.getElementById('mobileButton').addEventListener('click', handleAction);
            
            // Button handlers
            document.getElementById('startBtn').addEventListener('click', startGame);
            document.getElementById('restartBtn').addEventListener('click', restartGame);
            document.getElementById('nextLevelBtn').addEventListener('click', nextLevel);
            
            requestAnimationFrame(gameLoop);
        }

        function resizeCanvas() {
            const container = document.getElementById('gameContainer');
            const rect = container.getBoundingClientRect();
            
            canvas.width = rect.width * window.devicePixelRatio;
            canvas.height = rect.height * window.devicePixelRatio;
            
            gameWidth = canvas.width;
            gameHeight = canvas.height;
            
            ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
            
            gameWidth = rect.width;
            gameHeight = rect.height;
            
            // Update claw position
            clawX = gameWidth * 0.25;
            clawY = 80;
        }

        function handleKeyDown(e) {
            if (e.code === 'Space' && gameState === 'playing') {
                e.preventDefault();
                handleAction();
            }
        }

        function handleClick(e) {
            if (gameState === 'playing') {
                handleAction();
            }
        }

        function handleTouch(e) {
            if (gameState === 'playing') {
                e.preventDefault();
                handleAction();
            }
        }

        function handleAction() {
            if (clawState === 'rotating') {
                clawState = 'extending';
            } else if (clawState === 'extending') {
                clawState = 'retracting';
            } else if (clawState === 'retracting' && !grabbedMineral) {
                clawState = 'rotating';
                clawLength = 60;
            }
        }

        function startGame() {
            document.getElementById('startScreen').classList.add('hidden');
            currentLevel = 1;
            currentMoney = 0;
            startLevel();
        }

        function restartGame() {
            document.getElementById('gameOverScreen').classList.add('hidden');
            currentLevel = 1;
            currentMoney = 0;
            startLevel();
        }

        function nextLevel() {
            document.getElementById('levelCompleteScreen').classList.add('hidden');
            currentLevel++;
            startLevel();
        }

        function startLevel() {
            targetMoney = CONFIG.LEVEL_BASE_GOAL + (currentLevel - 1) * CONFIG.LEVEL_GOAL_INCREMENT;
            timeLeft = CONFIG.TIME_LIMIT;
            clawState = 'rotating';
            clawLength = 60;
            grabbedMineral = null;
            minerals = [];
            floatingTexts = [];
            moneyBags = [];
            
            generateMinerals();
            gameState = 'playing';
            updateUI();
        }

        function generateMinerals() {
            const count = CONFIG.MINERAL_COUNT_BASE + Math.min(currentLevel - 1, 5) * CONFIG.MINERAL_COUNT_INCREMENT;
            const types = Object.keys(MINERALS);
            
            // Define spawn area
            const minX = gameWidth * 0.35;
            const maxX = gameWidth - 30;
            const minY = gameHeight * 0.35;
            const maxY = gameHeight - 50;
            
            for (let i = 0; i < count; i++) {
                let typeIndex;
                const rand = Math.random();
                let cumulative = 0;
                
                // Weighted random selection
                for (let j = 0; j < types.length; j++) {
                    cumulative += MINERALS[types[j]].rarity;
                    if (rand < cumulative) {
                        typeIndex = j;
                        break;
                    }
                }
                typeIndex = typeIndex || 0;
                
                const type = types[typeIndex];
                const mineral = MINERALS[type];
                
                // Find non-overlapping position
                let x, y, attempts = 0;
                do {
                    x = minX + Math.random() * (maxX - minX);
                    y = minY + Math.random() * (maxY - minY);
                    attempts++;
                } while (attempts < 50 && minerals.some(m => {
                    const dx = m.x - x;
                    const dy = m.y - y;
                    return Math.sqrt(dx*dx + dy*dy) < (m.size + mineral.size);
                }));
                
                minerals.push({
                    x: x,
                    y: y,
                    type: type,
                    size: mineral.size,
                    value: mineral.value,
                    color: mineral.color,
                    name: mineral.name,
                    rotation: Math.random() * Math.PI * 2,
                    rotationSpeed: (Math.random() - 0.5) * 0.02
                });
            }
        }

        function updateClaw(deltaTime) {
            if (clawState === 'rotating') {
                clawAngle += CONFIG.CLAW_ROTATION_SPEED;
                if (clawAngle > Math.PI * 2) clawAngle -= Math.PI * 2;
            } else if (clawState === 'extending') {
                clawLength += CONFIG.CLAW_SPEED;
                
                // Check collision with minerals
                const clawTipX = clawX + Math.cos(clawAngle) * clawLength;
                const clawTipY = clawY + Math.sin(clawAngle) * clawLength;
                
                for (let mineral of minerals) {
                    const dx = mineral.x - clawTipX;
                    const dy = mineral.y - clawTipY;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    
                    if (dist < mineral.size + 15) {
                        grabbedMineral = mineral;
                        clawState = 'retracting';
                        break;
                    }
                }
                
                // Check bounds
                if (clawTipX < 0 || clawTipX > gameWidth || 
                    clawTipY < 0 || clawTipY > gameHeight) {
                    clawState = 'retracting';
                }
                
                // Max length check
                if (clawLength >= CONFIG.CLAW_MAX_LENGTH) {
                    clawState = 'retracting';
                }
            } else if (clawState === 'retracting') {
                if (grabbedMineral) {
                    // Speed based on value
                    const speed = Math.max(2, CONFIG.CLAW_RETRACT_SPEED - grabbedMineral.value / 300);
                    clawLength -= speed;
                    
                    // Update mineral position
                    const clawTipX = clawX + Math.cos(clawAngle) * clawLength;
                    const clawTipY = clawY + Math.sin(clawAngle) * clawLength;
                    grabbedMineral.x = clawTipX;
                    grabbedMineral.y = clawTipY;
                    
                    if (clawLength <= 60) {
                        // Collect mineral
                        currentMoney += grabbedMineral.value;
                        
                        // Add floating text
                        floatingTexts.push({
                            x: clawX,
                            y: clawY - 20,
                            text: '+$' + grabbedMineral.value,
                            alpha: 1,
                            vy: -2
                        });
                        // Add money bag
                        moneyBags.push({
                            x: clawX,
                            y: clawY,
                            targetX: 60,
                            targetY: 40,
                            alpha: 1,
                            scale: 1
                        });
                        
                        // Remove from array
                        const index = minerals.indexOf(grabbedMineral);
                        if (index > -1) minerals.splice(index, 1);
                        
                        grabbedMineral = null;
                        clawState = 'rotating';
                        clawLength = 60;
                        updateUI();
                    }
                } else {
                    clawLength -= CONFIG.CLAW_RETRACT_SPEED;
                    if (clawLength <= 60) {
                        clawLength = 60;
                        clawState = 'rotating';
                    }
                }
            }
        }

        function updateTimer(deltaTime) {
            timeLeft -= deltaTime / 1000;
            if (timeLeft <= 0) {
                timeLeft = 0;
                endLevel();
            }
            updateUI();
        }

        function updateEffects(deltaTime) {
            // Update floating texts
            floatingTexts = floatingTexts.filter(ft => {
                ft.y += ft.vy;
                ft.alpha -= 0.02;
                return ft.alpha > 0;
            });
            
            // Update money bags
            moneyBags = moneyBags.filter(bag => {
                bag.x += (bag.targetX - bag.x) * 0.2;
                bag.y += (bag.targetY - bag.y) * 0.2;
                bag.scale *= 0.95;
                bag.alpha -= 0.03;
                return bag.alpha > 0;
            });
            
            // Rotate minerals
            minerals.forEach(m => {
                m.rotation += m.rotationSpeed;
            });
        }

        function endLevel() {
            if (currentMoney >= targetMoney) {
                gameState = 'levelComplete';
                document.getElementById('levelScore').textContent = '$' + currentMoney;
                document.getElementById('nextTarget').textContent = '$' + (targetMoney + CONFIG.LEVEL_GOAL_INCREMENT);
                document.getElementById('levelCompleteScreen').classList.remove('hidden');
            } else {
                gameState = 'gameOver';
                document.getElementById('finalScore').textContent = '第' + currentLevel + '关: $' + currentMoney;
                document.getElementById('gameOverScreen').classList.remove('hidden');
            }
        }

        function updateUI() {
            document.getElementById('currentMoney').textContent = '$' + currentMoney;
            document.getElementById('targetMoney').textContent = '$' + targetMoney;
            document.getElementById('timeLeft').textContent = Math.ceil(timeLeft);
            document.getElementById('levelDisplay').textContent = '第 ' + currentLevel + ' 关';
            
            // Warning for low time
            const timeEl = document.getElementById('timeLeft').parentElement;
            if (timeLeft <= 10) {
                timeEl.style.background = 'linear-gradient(145deg, #c62828, #8b0000)';
                timeEl.classList.add('shake');
            } else {
                timeEl.style.background = 'linear-gradient(145deg, #8b6914, #5c4610)';
                timeEl.classList.remove('shake');
            }
        }

        function draw() {
            // Clear canvas
            ctx.clearRect(0, 0, gameWidth, gameHeight);
            
            // Draw background
            if (bgImage.complete) {
                ctx.drawImage(bgImage, 0, 0, gameWidth, gameHeight);
            } else {
                // Fallback gradient
                const gradient = ctx.createLinearGradient(0, 0, 0, gameHeight);
                gradient.addColorStop(0, '#5a4a3a');
                gradient.addColorStop(0.4, '#4a3728');
                gradient.addColorStop(1, '#2d1f15');
                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, gameWidth, gameHeight);
            }
            
            // Draw underground area
            ctx.fillStyle = '#3d2817';
            ctx.fillRect(gameWidth * 0.3, gameHeight * 0.25, gameWidth * 0.7, gameHeight * 0.75);
            
            // Draw dirt texture
            ctx.strokeStyle = '#2d1f15';
            ctx.lineWidth = 1;
            for (let i = 0; i < 30; i++) {
                const x = gameWidth * 0.3 + Math.random() * gameWidth * 0.7;
                const y = gameHeight * 0.25 + Math.random() * gameHeight * 0.75;
                ctx.beginPath();
                ctx.moveTo(x, y);
                ctx.lineTo(x + Math.random() * 20 - 10, y + Math.random() * 20 - 10);
                ctx.stroke();
            }
            
            // Draw minerals
            minerals.forEach(mineral => drawMineral(mineral));
            
            // Draw rope
            const endX = clawX + Math.cos(clawAngle) * clawLength;
            const endY = clawY + Math.sin(clawAngle) * clawLength;
            
            ctx.strokeStyle = '#8b4513';
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.moveTo(clawX, clawY);
            ctx.lineTo(endX, endY);
            ctx.stroke();
            
            // Draw rope texture
            ctx.strokeStyle = '#654321';
            ctx.lineWidth = 2;
            const segments = Math.floor(clawLength / 20);
            for (let i = 1; i <= segments; i++) {
                const sx = clawX + Math.cos(clawAngle) * (i * 20);
                const sy = clawY + Math.sin(clawAngle) * (i * 20);
                ctx.beginPath();
                ctx.arc(sx, sy, 3, 0, Math.PI * 2);
                ctx.stroke();
            }
            
            // Draw claw
            drawClaw(endX, endY);
            
            // Draw grabbed mineral
            if (grabbedMineral) {
                drawMineral(grabbedMineral);
            }
            
            // Draw floating texts
            floatingTexts.forEach(ft => {
                ctx.save();
                ctx.globalAlpha = ft.alpha;
                ctx.fillStyle = '#00ff00';
                ctx.font = 'bold 24px Arial';
                ctx.textAlign = 'center';
                ctx.fillText(ft.text, ft.x, ft.y);
                ctx.restore();
            });
            
            // Draw money bags
            moneyBags.forEach(bag => {
                ctx.save();
                ctx.globalAlpha = bag.alpha;
                ctx.translate(bag.x, bag.y);
                ctx.scale(bag.scale, bag.scale);
                
                // Draw simple money bag
                ctx.fillStyle = '#8b4513';
                ctx.beginPath();
                ctx.moveTo(-15, 10);
                ctx.quadraticCurveTo(-20, -10, -10, -15);
                ctx.lineTo(10, -15);
                ctx.quadraticCurveTo(20, -10, 15, 10);
                ctx.closePath();
                ctx.fill();
                
                ctx.fillStyle = '#ffd700';
                ctx.font = 'bold 16px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('$', 0, 0);
                
                ctx.restore();
            });
        }

        function drawClaw(x, y) {
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(clawAngle);
            
            const isOpen = clawState === 'extending';
            const openAngle = isOpen ? 0.5 : 0.2;
            
            // Main body
            ctx.fillStyle = '#4169E1';
            ctx.beginPath();
            ctx.arc(0, 0, 12, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = '#2c4a8c';
            ctx.lineWidth = 2;
            ctx.stroke();
            
            // Claw arms
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 4;
            
            // Left arm
            ctx.beginPath();
            ctx.moveTo(-5, 5);
            ctx.lineTo(-15, 20 + (isOpen ? 5 : 0));
            ctx.stroke();
            
            // Right arm
            ctx.beginPath();
            ctx.moveTo(5, 5);
            ctx.lineTo(15, 20 + (isOpen ? 5 : 0));
            ctx.stroke();
            
            // Claw tips
            ctx.fillStyle = '#666';
            ctx.beginPath();
            ctx.arc(-15, 20 + (isOpen ? 5 : 0), 5, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(15, 20 + (isOpen ? 5 : 0), 5, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.restore();
        }

        function drawMineral(mineral) {
            ctx.save();
            ctx.translate(mineral.x, mineral.y);
            
            // Shadow
            ctx.fillStyle = 'rgba(0,0,0,0.3)';
            ctx.beginPath();
            ctx.ellipse(3, mineral.size * 0.3, mineral.size * 0.8, mineral.size * 0.3, 0, 0, Math.PI * 2);
            ctx.fill();
            
            // Main shape based on type
            if (mineral.type.includes('DIAMOND')) {
                // Diamond shape
                ctx.rotate(mineral.rotation);
                ctx.fillStyle = mineral.color;
                ctx.beginPath();
                ctx.moveTo(0, -mineral.size);
                ctx.lineTo(mineral.size * 0.7, 0);
                ctx.lineTo(0, mineral.size * 0.6);
                ctx.lineTo(-mineral.size * 0.7, 0);
                ctx.closePath();
                ctx.fill();
                
                // Shine
                ctx.fillStyle = 'rgba(255,255,255,0.6)';
                ctx.beginPath();
                ctx.moveTo(0, -mineral.size);
                ctx.lineTo(mineral.size * 0.3, -mineral.size * 0.3);
                ctx.lineTo(0, 0);
                ctx.lineTo(-mineral.size * 0.3, -mineral.size * 0.3);
                ctx.closePath();
                ctx.fill();
            } else {
                // Irregular rock/gold shape
                ctx.rotate(mineral.rotation);
                ctx.fillStyle = mineral.color;
                ctx.beginPath();
                const points = 8;
                for (let i = 0; i < points; i++) {
                    const angle = (i / points) * Math.PI * 2;
                    const radius = mineral.size * (0.7 + Math.sin(i * 2.5) * 0.3);
                    const px = Math.cos(angle) * radius;
                    const py = Math.sin(angle) * radius;
                    if (i === 0) ctx.moveTo(px, py);
                    else ctx.lineTo(px, py);
                }
                ctx.closePath();
                ctx.fill();
                
                // Highlight
                ctx.fillStyle = 'rgba(255,255,255,0.3)';
                ctx.beginPath();
                ctx.arc(-mineral.size * 0.3, -mineral.size * 0.3, mineral.size * 0.25, 0, Math.PI * 2);
                ctx.fill();
            }
            
            ctx.restore();
        }

        function gameLoop(timestamp) {
            const deltaTime = timestamp - lastTime;
            lastTime = timestamp;
            
            if (gameState === 'playing') {
                updateClaw(deltaTime);
                updateTimer(deltaTime);
                updateEffects(deltaTime);
            }
            
            draw();
            requestAnimationFrame(gameLoop);
        }

        // Start the game
        init();
    </script>
</body>
</html>
