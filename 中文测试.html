<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中文还真能在Github里填入啊😦</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: #1a1a2e;
            font-family: Arial, sans-serif;
        }
        #count {
            color: #eee;
            font-size: 72px;
            margin-bottom: 30px;
        }
        #btn {
            width: 150px;
            height: 150px;
            background: #e94560;
            border: none;
            border-radius: 20px;
            color: white;
            font-size: 24px;
            cursor: pointer;
            transition: transform 0.1s, background 0.2s;
        }
        #btn:hover { background: #ff6b6b; }
        #btn:active { transform: scale(0.95); }
    </style>
</head>
<body>
    <div id="count">0</div>
    <button id="btn">点击他没惊喜</button>
    <script>
        let n = 0;
        document.getElementById('btn').onclick = () => {
            document.getElementById('count').textContent = ++n;
        };
    </script>
</body>
</html>
