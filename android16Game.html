    <canvas id="gameCanvas"></canvas>
    
    <div id="ui">
        <div id="info" class="hidden">
            <div>速度: <span id="speed">0</span></div>
            <div>坐标: <span id="coords">0, 0</span></div>
            <div>最近星体: <span id="nearest">-</span></div>
            <div>已探索: <span id="explored">0</span></div>
        </div>
        
        <button id="autoBtn" class="hidden">AUTO</button>
        
        <div id="instructions" class="hidden">
            方向键/WASD 控制飞船<br>
            接近星体减速着陆
        </div>
        
        <div id="title">
            <h1>🚀 太空探索</h1>
            <p>Android 16 Easter Egg</p>
            <button id="startBtn">开始探索</button>
        </div>
    </div>
    
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        let width, height;
        let gameStarted = false;
        let autoMode = false;
        
        // 飞船
        const ship = {
            x: 0,
            y: 0,
            vx: 0,
            vy: 0,
            angle: -Math.PI / 2,
            size: 20,
            thrust: 0.15,
            friction: 0.99,
            maxSpeed: 8
        };
        
        // 星体
        let bodies = [];
        const bodyTypes = ['star', 'planet', 'moon'];
        const bodyColors = {
            star: ['#FFD700', '#FFA500', '#FF6B6B', '#87CEEB', '#DDA0DD'],
            planet: ['#8B4513', '#CD853F', '#DEB887', '#4682B4', '#9ACD32', '#FF6347'],
            moon: ['#C0C0C0', '#A9A9A9', '#808080', '#696969']
        };
        
        // 已探索的星体
        let explored = new Set();
        
        // 星星背景
        let stars = [];
        
        // 控制
        const keys = {};
        
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            ship.x = width / 2;
            ship.y = height / 2;
        }
        
        function generateStars() {
            stars = [];
            for (let i = 0; i < 200; i++) {
                stars.push({
                    x: Math.random() * width * 3 - width,
                    y: Math.random() * height * 3 - height,
                    size: Math.random() * 2 + 0.5,
                    brightness: Math.random()
                });
            }
        }
        
        function generateBodies() {
            bodies = [];
            const numBodies = 15 + Math.floor(Math.random() * 10);
            
            for (let i = 0; i < numBodies; i++) {
                const type = bodyTypes[Math.floor(Math.random() * bodyTypes.length)];
                const colors = bodyColors[type];
                
                bodies.push({
                    x: Math.random() * width * 2 - width / 2,
                    y: Math.random() * height * 2 - height / 2,
                    radius: type === 'star' ? 40 + Math.random() * 30 : 
                            type === 'planet' ? 15 + Math.random() * 25 : 
                            8 + Math.random() * 12,
                    type: type,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    name: generateName(),
                    mass: Math.random() * 100 + 10,
                    hasFlag: false
                });
            }
            
            // 确保有一个大恒星作为太阳
            bodies.unshift({
                x: width / 2 + 200,
                y: height / 2 - 100,
                radius: 60,
                type: 'star',
                color: '#FFD700',
                name: '太阳',
                mass: 1000,
                hasFlag: false
            });
        }
        
        function generateName() {
            const prefixes = ['阿尔法', '贝塔', '伽马', '德尔塔', '艾普西隆', '泽塔', '奥米伽', 'Proxima', 'Kepler', 'Gliese'];
            const suffixes = ['座', '星', '云', 'IX', 'VII', 'III', 'B', 'C', '-b', '-c'];
            return prefixes[Math.floor(Math.random() * prefixes.length)] + 
                   suffixes[Math.floor(Math.random() * suffixes.length)];
        }
        
        function init() {
            resize();
            generateStars();
            generateBodies();
            ship.x = width / 2;
            ship.y = height / 2;
            ship.vx = 0;
            ship.vy = 0;
            explored.clear();
            autoMode = false;
            document.getElementById('autoBtn').classList.remove('active');
        }
        
        function startGame() {
            gameStarted = true;
            document.getElementById('title').classList.add('hidden');
            document.getElementById('info').classList.remove('hidden');
            document.getElementById('autoBtn').classList.remove('hidden');
            document.getElementById('instructions').classList.remove('hidden');
            init();
            gameLoop();
        }
        
        function update() {
            if (!gameStarted) return;
            
            // 手动控制
            if (!autoMode) {
                if (keys['ArrowUp'] || keys['KeyW']) ship.vy -= ship.thrust;
                if (keys['ArrowDown'] || keys['KeyS']) ship.vy += ship.thrust;
                if (keys['ArrowLeft'] || keys['KeyA']) ship.vx -= ship.thrust;
                if (keys['ArrowRight'] || keys['KeyD']) ship.vx += ship.thrust;
            } else {
                // 自动导航到最近的未探索星体
                let nearest = null;
                let nearestDist = Infinity;
                
                for (const body of bodies) {
                    if (!explored.has(body)) {
                        const dx = body.x - ship.x;
                        const dy = body.y - ship.y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < nearestDist) {
                            nearestDist = dist;
                            nearest = body;
                        }
                    }
                }
                
                if (nearest) {
                    const dx = nearest.x - ship.x;
                    const dy = nearest.y - ship.y;
                    const targetAngle = Math.atan2(dy, dx);
                    
                    // 缓慢转向
                    ship.vx += Math.cos(targetAngle) * ship.thrust * 0.5;
                    ship.vy += Math.sin(targetAngle) * ship.thrust * 0.5;
                }
            }
            
            // 限制速度
            const speed = Math.sqrt(ship.vx * ship.vx + ship.vy * ship.vy);
            if (speed > ship.maxSpeed) {
                ship.vx = (ship.vx / speed) * ship.maxSpeed;
                ship.vy = (ship.vy / speed) * ship.maxSpeed;
            }
            
            // 应用摩擦力
            ship.vx *= ship.friction;
            ship.vy *= ship.friction;
            
            // 更新位置
            ship.x += ship.vx;
            ship.y += ship.vy;
            
            // 更新飞船角度
            if (speed > 0.1) {
                ship.angle = Math.atan2(ship.vy, ship.vx);
            }
            
            // 检查与星体的碰撞
            for (const body of bodies) {
                const dx = body.x - ship.x;
                const dy = body.y - ship.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                
                if (dist < body.radius + ship.size / 2) {
                    // 靠近减速着陆
                    if (speed < 2) {
                        explored.add(body);
                        body.hasFlag = true;
                        ship.vx *= 0.5;
                        ship.vy *= 0.5;
                    } else {
                        // 太快了，弹开
                        const nx = dx / dist;
                        const ny = dy / dist;
                        ship.x = body.x - nx * (body.radius + ship.size / 2 + 5);
                        ship.y = body.y - ny * (body.radius + ship.size / 2 + 5);
                        ship.vx = -nx * speed * 0.5;
                        ship.vy = -ny * speed * 0.5;
                    }
                }
            }
            
            // 更新UI
            document.getElementById('speed').textContent = speed.toFixed(1);
            document.getElementById('coords').textContent = 
                Math.round(ship.x) + ', ' + Math.round(ship.y);
            document.getElementById('explored').textContent = explored.size + ' / ' + bodies.length;
            
            // 找最近的星体
            let nearestBody = null;
            let nearestDist = Infinity;
            for (const body of bodies) {
                const dx = body.x - ship.x;
                const dy = body.y - ship.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < nearestDist) {
                    nearestDist = dist;
                    nearestBody = body;
                }
            }
            document.getElementById('nearest').textContent = 
                nearestBody ? nearestBody.name + ' (' + Math.round(nearestDist) + ')' : '-';
        }
        
        function draw() {
            // 清空画布
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, width, height);
            
            // 相机偏移
            const offsetX = width / 2 - ship.x;
            const offsetY = height / 2 - ship.y;
            
            // 绘制星星背景
            ctx.save();
            for (const star of stars) {
                const sx = star.x + offsetX * 0.3;
                const sy = star.y + offsetY * 0.3;
                
                if (sx > -50 && sx < width + 50 && sy > -50 && sy < height + 50) {
                    const twinkle = 0.5 + Math.sin(Date.now() / 500 + star.brightness * 10) * 0.5;
                    ctx.fillStyle = `rgba(255, 255, 255, ${star.brightness * twinkle})`;
                    ctx.beginPath();
                    ctx.arc(sx, sy, star.size, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
            ctx.restore();
            
            // 绘制星体
            for (const body of bodies) {
                const bx = body.x + offsetX;
                const by = body.y + offsetY;
                
                if (bx > -100 && bx < width + 100 && by > -100 && by < height + 100) {
                    // 发光效果
                    const gradient = ctx.createRadialGradient(
                        bx, by, 0, bx, by, body.radius * 2
                    );
                    gradient.addColorStop(0, body.color);
                    gradient.addColorStop(0.5, body.color + '40');
                    gradient.addColorStop(1, 'transparent');
                    ctx.fillStyle = gradient;
                    ctx.beginPath();
                    ctx.arc(bx, by, body.radius * 2, 0, Math.PI * 2);
                    ctx.fill();
                    
                    // 星体本身
                    ctx.fillStyle = body.color;
                    ctx.beginPath();
                    ctx.arc(bx, by, body.radius, 0, Math.PI * 2);
                    ctx.fill();
                    
                    // 恒星光晕
                    if (body.type === 'star') {
                        ctx.strokeStyle = '#FFD70020';
                        ctx.lineWidth = 3;
                        for (let i = 1; i <= 3; i++) {
                            ctx.beginPath();
                            ctx.arc(bx, by, body.radius + i * 10, 0, Math.PI * 2);
                            ctx.stroke();
                        }
                    }
                    
                    // 旗帜
                    if (body.hasFlag) {
                        ctx.fillStyle = '#FFFF00';
                        ctx.beginPath();
                        ctx.moveTo(bx, by - body.radius - 20);
                        ctx.lineTo(bx + 15, by - body.radius - 15);
                        ctx.lineTo(bx, by - body.radius - 10);
                        ctx.fill();
                        ctx.strokeStyle = '#FFFFFF';
                        ctx.lineWidth = 2;
                        ctx.beginPath();
                        ctx.moveTo(bx, by - body.radius - 20);
                        ctx.lineTo(bx, by - body.radius + 5);
                        ctx.stroke();
                    }
                    
                    // 星体名称
                    ctx.fillStyle = '#FFFFFF80';
                    ctx.font = '10px Arial';
                    ctx.textAlign = 'center';
                    ctx.fillText(body.name, bx, by + body.radius + 15);
                }
            }
            
            // 绘制飞船
            const sx = ship.x + offsetX;
            const sy = ship.y + offsetY;
            
            ctx.save();
            ctx.translate(sx, sy);
            ctx.rotate(ship.angle + Math.PI / 2);
            
            // 引擎火焰
            const flameSize = 5 + Math.random() * 5;
            if (keys['ArrowUp'] || keys['KeyW'] || autoMode) {
                ctx.fillStyle = '#FF660080';
                ctx.beginPath();
                ctx.moveTo(-5, 10);
                ctx.lineTo(0, 10 + flameSize);
                ctx.lineTo(5, 10);
                ctx.fill();
            }
            
            // 飞船主体
            ctx.fillStyle = '#0F0';
            ctx.beginPath();
            ctx.moveTo(0, -ship.size);
            ctx.lineTo(-ship.size / 2, ship.size / 2);
            ctx.lineTo(0, ship.size / 3);
            ctx.lineTo(ship.size / 2, ship.size / 2);
            ctx.closePath();
            ctx.fill();
            
            // 飞船轮廓
            ctx.strokeStyle = '#0F0';
            ctx.lineWidth = 2;
            ctx.stroke();
            
            ctx.restore();
            
            // 速度指示器
            const speed = Math.sqrt(ship.vx * ship.vx + ship.vy * ship.vy);
            if (speed > 0.5) {
                ctx.strokeStyle = '#0F080';
                ctx.lineWidth = 2;
                ctx.setLineDash([5, 5]);
                ctx.beginPath();
                ctx.moveTo(sx, sy);
                ctx.lineTo(sx + ship.vx * 10, sy + ship.vy * 10);
                ctx.stroke();
                ctx.setLineDash([]);
            }
        }
        
        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }
        
        // 事件监听
        window.addEventListener('resize', resize);
        
        window.addEventListener('keydown', (e) => {
            keys[e.code] = true;
        });
        
        window.addEventListener('keyup', (e) => {
            keys[e.code] = false;
        });
        
        // 触摸控制
        let touchStartX, touchStartY;
        
        canvas.addEventListener('touchstart', (e) => {
            if (!gameStarted) return;
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        });
        
        canvas.addEventListener('touchmove', (e) => {
            if (!gameStarted || autoMode) return;
            e.preventDefault();
            const dx = e.touches[0].clientX - touchStartX;
            const dy = e.touches[0].clientY - touchStartY;
            
            ship.vx += dx * 0.002;
            ship.vy += dy * 0.002;
            
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        });
        
        // AUTO按钮
        document.getElementById('autoBtn').addEventListener('click', () => {
            autoMode = !autoMode;
            document.getElementById('autoBtn').classList.toggle('active', autoMode);
        });
        
        // 开始按钮
        document.getElementById('startBtn').addEventListener('click', startGame);
        
        // 初始化
        resize();
        generateStars();
