<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Android 16 太空彩蛋游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            overflow: hidden;
            user-select: none;
        }
        body {
            background: #000000;
            font-family: system-ui, -apple-system, sans-serif;
        }
        #gameCanvas {
            display: block;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(180deg, #000000 0%, #0a0a23 100%);
        }
        #autoBtn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 12px 24px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid #ffffff;
            border-radius: 50px;
            color: #ffffff;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: all 0.2s ease;
            z-index: 100;
        }
        #autoBtn.active {
            background: #ffffff;
            color: #000000;
        }
        #autoBtn:hover {
            transform: scale(1.05);
        }
        .shake {
            animation: shake 0.2s ease-in-out;
        }
        @keyframes shake {
            0%, 100% { transform: translate(0); }
            25% { transform: translate(-5px, 5px); }
            50% { transform: translate(5px, -5px); }
            75% { transform: translate(-5px, -5px); }
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <button id="autoBtn">AUTO</button>

    <script>
        // 画布初始化
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const autoBtn = document.getElementById('autoBtn');
        
        // 画布尺寸适配
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // 游戏核心配置
        const config = {
            starCount: 120,        // 星星数量
            asteroidCount: 15,     // 小行星数量
            shipSpeed: 5,          // 飞船移动速度
            autoSpeed: 3.5,        // 自动驾驶速度
            baseScrollSpeed: 2,    // 基础滚动速度
            isAuto: false,         // 自动驾驶开关
            isShaking: false       // 碰撞震动开关
        };

        // 游戏对象
        let stars = [];         // 星星数组
        let asteroids = [];     // 小行星数组
        let ship = {             // 飞船属性
            x: canvas.width / 2,
            y: canvas.height / 2,
            width: 40,
            height: 60,
            radius: 20,
            isDragging: false,
            dragOffsetX: 0,
            dragOffsetY: 0
        };

        // 生成星星（三层视差效果）
        function initStars() {
            stars = [];
            for (let i = 0; i < config.starCount; i++) {
                stars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 2 + 0.5,
                    speed: Math.random() * 2 + 0.5,
                    opacity: Math.random() * 0.8 + 0.2
                });
            }
        }

        // 生成小行星
        function initAsteroids() {
            asteroids = [];
            for (let i = 0; i < config.asteroidCount; i++) {
                createAsteroid();
            }
        }

        // 创建单个小行星
        function createAsteroid(isReset = false) {
            const asteroid = {
                x: isReset ? Math.random() * canvas.width : Math.random() * canvas.width,
                y: isReset ? -50 : Math.random() * -canvas.height,
                size: Math.random() * 30 + 15,
                speed: Math.random() * 3 + config.baseScrollSpeed,
                rotate: Math.random() * Math.PI * 2,
                rotateSpeed: (Math.random() - 0.5) * 0.05
            };
            asteroids.push(asteroid);
        }

        // 更新星星位置
        function updateStars() {
            stars.forEach(star => {
                star.y += star.speed;
                // 超出屏幕重置
                if (star.y > canvas.height) {
                    star.y = -10;
                    star.x = Math.random() * canvas.width;
                }
            });
        }

        // 更新小行星位置
        function updateAsteroids() {
            for (let i = asteroids.length - 1; i >= 0; i--) {
                const rock = asteroids[i];
                rock.y += rock.speed;
                rock.rotate += rock.rotateSpeed;

                // 超出屏幕重置
                if (rock.y > canvas.height + rock.size) {
                    asteroids.splice(i, 1);
                    createAsteroid(true);
                }
            }
        }

        // 自动驾驶逻辑
        function autoPilot() {
            if (!config.isAuto) return;

            // 检测前方危险小行星
            let nearestRock = null;
            let minDistance = Infinity;

            asteroids.forEach(rock => {
                // 只检测飞船前方、同水平区域的小行星
                if (rock.y < ship.y + ship.height && rock.y > ship.y - 200) {
                    const dx = rock.x - ship.x;
                    const dy = rock.y - ship.y;
                    const distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance < minDistance) {
                        minDistance = distance;
                        nearestRock = rock;
                    }
                }
            });

            // 自动躲避
            if (nearestRock && minDistance < 120) {
                const offsetLeft = nearestRock.x - (ship.x - 80);
                const offsetRight = (ship.x + 80) - nearestRock.x;
                // 选择距离更远的一侧躲避
                if (offsetLeft > offsetRight) {
                    ship.x = Math.max(ship.radius, ship.x - config.autoSpeed);
                } else {
                    ship.x = Math.min(canvas.width - ship.radius, ship.x + config.autoSpeed);
                }
            }
        }

        // 碰撞检测
        function checkCollision() {
            asteroids.forEach(rock => {
                const dx = rock.x - ship.x;
                const dy = rock.y - ship.y;
                const distance = Math.sqrt(dx * dx + dy * dy);

                // 碰撞触发
                if (distance < ship.radius + rock.size / 2) {
                    if (!config.isShaking) {
                        config.isShaking = true;
                        document.body.classList.add('shake');
                        // 震动结束重置
                        setTimeout(() => {
                            document.body.classList.remove('shake');
                            config.isShaking = false;
                        }, 200);
                    }
                }
            });
        }

        // 渲染星星
        function renderStars() {
            stars.forEach(star => {
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${star.opacity})`;
                ctx.fill();
            });
        }

        // 渲染小行星
        function renderAsteroids() {
            asteroids.forEach(rock => {
                ctx.save();
                ctx.translate(rock.x, rock.y);
                ctx.rotate(rock.rotate);
                
                // 绘制不规则小行星
                ctx.beginPath();
                const points = 8;
                for (let i = 0; i < points; i++) {
                    const angle = (i / points) * Math.PI * 2;
                    const radius = rock.size * (0.8 + Math.random() * 0.4);
                    const x = Math.cos(angle) * radius;
                    const y = Math.sin(angle) * radius;
                    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
                }
                ctx.closePath();
                ctx.fillStyle = '#3a3a4a';
                ctx.fill();
                ctx.strokeStyle = '#666677';
                ctx.lineWidth = 2;
                ctx.stroke();
                
                ctx.restore();
            });
        }

        // 渲染飞船
        function renderShip() {
            ctx.save();
            ctx.translate(ship.x, ship.y);

            // 飞船尾焰
            ctx.beginPath();
            ctx.moveTo(-10, 25);
            ctx.lineTo(0, 40 + Math.random() * 10);
            ctx.lineTo(10, 25);
            ctx.closePath();
            const gradient = ctx.createLinearGradient(0, 25, 0, 50);
            gradient.addColorStop(0, '#ffffff');
            gradient.addColorStop(1, '#00aaff');
            ctx.fillStyle = gradient;
            ctx.fill();

            // 飞船主体
            ctx.beginPath();
            ctx.moveTo(0, -ship.height / 2);
            ctx.lineTo(ship.width / 2, ship.height / 2);
            ctx.lineTo(-ship.width / 2, ship.height / 2);
            ctx.closePath();
            ctx.fillStyle = '#ffffff';
            ctx.fill();

            // 飞船窗口
            ctx.beginPath();
            ctx.arc(0, -5, 8, 0, Math.PI * 2);
            ctx.fillStyle = '#00aaff';
            ctx.fill();

            ctx.restore();
        }

        // 游戏主循环
        function gameLoop() {
            // 清空画布
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 更新逻辑
            updateStars();
            updateAsteroids();
            autoPilot();
            checkCollision();

            // 渲染画面
            renderStars();
            renderAsteroids();
            renderShip();

            requestAnimationFrame(gameLoop);
        }

        // 鼠标/触摸操控事件
        // 按下事件
        function handleStart(x, y) {
            // 检测是否点击到飞船
            const dx = x - ship.x;
            const dy = y - ship.y;
            const distance = Math.sqrt(dx * dx + dy * dy);

            if (distance < ship.radius * 2) {
                ship.isDragging = true;
                ship.dragOffsetX = x - ship.x;
                ship.dragOffsetY = y - ship.y;
                config.isAuto = false;
                autoBtn.classList.remove('active');
            }
        }

        // 移动事件
        function handleMove(x, y) {
            if (ship.isDragging) {
                let newX = x - ship.dragOffsetX;
                let newY = y - ship.dragOffsetY;

                // 边界限制
                newX = Math.max(ship.radius, Math.min(canvas.width - ship.radius, newX));
                newY = Math.max(ship.radius, Math.min(canvas.height - ship.radius, newY));

                ship.x = newX;
                ship.y = newY;
            }
        }

        // 松开事件
        function handleEnd() {
            ship.isDragging = false;
        }

        // PC端鼠标事件
        canvas.addEventListener('mousedown', (e) => {
            handleStart(e.clientX, e.clientY);
        });
        canvas.addEventListener('mousemove', (e) => {
            handleMove(e.clientX, e.clientY);
        });
        window.addEventListener('mouseup', handleEnd);

        // 移动端触摸事件
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            handleStart(touch.clientX, touch.clientY);
        });
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            handleMove(touch.clientX, touch.clientY);
        });
        window.addEventListener('touchend', handleEnd);

        // AUTO按钮切换
        autoBtn.addEventListener('click', () => {
            config.isAuto = !config.isAuto;
            autoBtn.classList.toggle('active', config.isAuto);
        });

        // 游戏初始化启动
        initStars();
        initAsteroids();
        gameLoop();
    </script>
</body>
</html>
